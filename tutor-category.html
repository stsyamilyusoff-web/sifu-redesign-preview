<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sifututor tutor app &middot; category</title>
<style>
  *{box-sizing:border-box}
  html,body{background:#f6f7fb;margin:0}
  body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;color:#18181b;padding:26px 16px;--tint:#243cb3}
  .doc{max-width:820px;margin:0 auto}
  .back{display:inline-block;font-size:12px;font-weight:700;color:var(--tint);text-decoration:none;margin-bottom:12px}
  .back:hover{text-decoration:underline}
  .hd{background:#243cb3;color:#fff;border-radius:18px;padding:24px 26px}
  .eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;opacity:.85}
  .hd .t{font-size:23px;font-weight:800;letter-spacing:-.3px;margin-top:5px}
  .hd .s{font-size:13px;opacity:.93;margin-top:7px;line-height:1.55}
  .counts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .cpill{font-size:11px;font-weight:700;border-radius:99px;padding:4px 11px;background:rgba(255,255,255,.16);color:#fff}
  .sh{font-size:13px;font-weight:800;margin:22px 2px 10px;color:#3f3f46}
  .briefs{display:flex;flex-wrap:wrap;gap:9px}
  .brief{display:block;text-decoration:none;background:#fff;border:1px solid rgba(36,60,179,.25);border-radius:11px;padding:11px 14px;min-width:200px;transition:box-shadow .12s,transform .12s}
  .brief:hover{box-shadow:0 6px 18px rgba(36,60,179,.13);transform:translateY(-1px)}
  .brief .bl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#1a5c38;background:#e9f5ee;border-radius:99px;padding:2px 8px;display:inline-block}
  .brief .bt{font-size:13.5px;font-weight:800;color:#18181b;margin-top:6px}
  .brief .bg{font-size:11px;font-weight:700;color:var(--tint);margin-top:6px}
  .nobrief{font-size:12px;color:#52525b;background:#fff;border:1px dashed #d4d4d8;border-radius:11px;padding:12px 14px;line-height:1.5}
  .legend{display:flex;flex-wrap:wrap;gap:13px;font-size:11px;color:#52525b;margin:6px 2px 0;line-height:1.5}
  .lg{display:inline-flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:99px;display:inline-block}
  .rows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  @media (max-width:680px){ .rows{grid-template-columns:1fr} }
  .row{display:flex;gap:9px;background:#fff;border:1px solid #e9e9ee;border-radius:11px;padding:11px 13px;align-items:flex-start}
  .rb{flex:1;min-width:0}
  .rn{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .rd{font-size:11.5px;color:#6b6b73;line-height:1.45;margin-top:3px}
  .pill{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;border-radius:99px;padding:2px 7px;white-space:nowrap}
  .p-briefed{background:#e9f5ee;color:#1a5c38}
  .p-floored{background:#eef1fb;color:#243cb3}
  .p-baseline{background:#f1f1f4;color:#71717a}
  .p-deprecated{background:#fff7ed;color:#9a3412}
  .p-p0{background:#fee2e2;color:#b91c1c}
  .catlist{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .catlink{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #e6e6ea;border-radius:11px;padding:13px 15px;text-decoration:none;color:inherit}
  .catlink:hover{background:#eef1fb}
  .ft{font-size:11px;color:#9a9aa0;text-align:center;margin:24px 0 4px;line-height:1.6}
</style>
</head>
<body>
<div class="doc" id="doc">
  <a class="back" href="tutor-screen-index.html">&#8592; All screens</a>
  <div id="body"></div>
  <div class="ft">Sifututor redesign &middot; tutor app screen inventory &middot; 26 June 2026 &middot; inventory of the live app + redesign status, not a mockup</div>
</div>

<script src="tutor-screens-data.js"></script>
<script>
const CATS = window.TUTOR_CATS, LABEL = window.TUTOR_LABEL;
const params = new URLSearchParams(window.location.search);
const key = params.get('cat');
const cat = CATS.find(c=>c.key===key);
const body = document.getElementById('body');

const legend = `<div class="legend">
  <span class="lg"><span class="dot" style="background:#1a5c38"></span>Briefed</span>
  <span class="lg"><span class="dot" style="background:#243cb3"></span>Floored</span>
  <span class="lg"><span class="dot" style="background:#71717a"></span>Baseline</span>
  <span class="lg"><span class="dot" style="background:#9a3412"></span>Deprecated</span>
  <span class="lg"><span class="dot" style="background:#b91c1c"></span>P0 fixed</span>
</div>`;

if (!cat) {
  body.innerHTML = `<div class="hd"><div class="t">Pick a category</div><div class="s">No category was selected. Choose one below.</div></div>
    <div class="catlist">${CATS.map(c=>`<a class="catlink" href="tutor-category.html?cat=${c.key}"><span><b>${c.t}</b> &middot; ${c.tab}</span><span style="color:#9a9aa0;font-size:12px">${c.screens.length} screens &#8594;</span></a>`).join('')}</div>`;
} else {
  const counts = {briefed:0,floored:0,baseline:0,deprecated:0,p0:0};
  cat.screens.forEach(s=>{counts[s.s]++;if(s.p0)counts.p0++;});
  const briefsHtml = cat.briefs && cat.briefs.length
    ? `<div class="sh">Redesign briefs covering this category</div><div class="briefs">${cat.briefs.map(b=>`<a class="brief" href="${b.href}"><span class="bl">Brief</span><div class="bt">${b.label}</div><div class="bg">View brief &#8594;</div></a>`).join('')}</div>`
    : `<div class="sh">Redesign briefs covering this category</div><div class="nobrief">No dedicated redesign brief. These screens are consistency-floored to the app standard; a redesign can be scoped later if needed.</div>`;
  body.innerHTML = `
    <div class="hd">
      <div class="eyebrow">${cat.tab} tab</div>
      <div class="t">${cat.t}</div>
      <div class="s">${cat.desc}</div>
      <div class="counts">
        <span class="cpill">${cat.screens.length} screens</span>
        ${counts.briefed?`<span class="cpill">${counts.briefed} briefed</span>`:''}
        ${counts.floored?`<span class="cpill">${counts.floored} floored</span>`:''}
        ${counts.baseline?`<span class="cpill">${counts.baseline} baseline</span>`:''}
        ${counts.deprecated?`<span class="cpill">${counts.deprecated} deprecated</span>`:''}
        ${counts.p0?`<span class="cpill">${counts.p0} P0 fixed</span>`:''}
      </div>
    </div>
    ${briefsHtml}
    <div class="sh">Screens (${cat.screens.length})</div>
    ${legend}
    <div class="rows" style="margin-top:10px">
      ${cat.screens.map(s=>`
        <div class="row"><div class="rb">
          <div class="rn">${s.n}<span class="pill p-${s.s}">${LABEL[s.s]}</span>${s.p0?'<span class="pill p-p0">P0</span>':''}</div>
          <div class="rd">${s.d}</div>
        </div></div>`).join('')}
    </div>`;
  document.title = `Sifututor &middot; ${cat.t}`;
}
</script>
</body>
</html>
